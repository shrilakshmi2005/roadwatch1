<!DOCTYPE html>
<html>

<head>

    <title>Settings</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    

    <div class="profile-container">

        <!-- ICON -->

        <div class="profile-image">

            ⚙️

        </div>

        

        <h1>Settings</h1>

        

        <div class="profile-card">

          

            <div class="input-group">

                <label>

                    🔊 Volume

                </label>

                <input
                    type="range"
                    min="0"
                    max="100"
                    id="volume">

            </div>

           

            <div class="input-group">

                <label>

                    📧 Change Email

                </label>

                <input
                    type="email"
                    id="newEmail"
                    placeholder="Enter new email">

            </div>

         

            <div class="input-group">

                <label>

                    🔐 Change Password

                </label>

                <input
                    type="password"
                    id="newPass"
                    placeholder="Enter new password">

            </div>

        </div>

       

        <div class="button-box">

            <button onclick="changeEmail()">

                Update Email

            </button>

            <button onclick="changePassword()">

                Update Password

            </button>

        </div>

        <br>

        <div class="button-box">

            <button onclick="clearData()">

                Clear Data

            </button>

            <button onclick="logout()">

                Logout

            </button>

        </div>

    </div>

    

    <script src="settings.js"></script>

</body>

</html>
