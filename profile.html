<!DOCTYPE html>
<html>

<head>

    <title>Profile</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <!-- PROFILE CONTAINER -->

    <div class="profile-container">

        <!-- PROFILE ICON -->

        <div class="profile-image">

            👤

        </div>

        <!-- TITLE -->

        <h1>User Profile</h1>

        <!-- PROFILE BOX -->

        <div class="profile-card">

            <!-- NAME -->

            <div class="input-group">

                <label>Name</label>

                <input
                    type="text"
                    id="name"
                    placeholder="Enter Name">

            </div>

            <!-- EMAIL -->

            <div class="input-group">

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter Email">

            </div>

            <!-- PHONE -->

            <div class="input-group">

                <label>Phone</label>

                <input
                    type="text"
                    id="phone"
                    placeholder="Enter Phone Number">

            </div>

            <!-- PASSWORD -->

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter Password">

            </div>

        </div>

        <!-- BUTTONS -->

        <div class="button-box">

            <button onclick="saveProfile()">

                💾 Save

            </button>

            <button onclick="goDashboard()">

                Dashboard

            </button>

        </div>

    </div>

    <!-- SCRIPT -->

    <script src="profile.js"></script>

    <script>


    </script>

</body>

</html>
