<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link rel="stylesheet"
          href="login.css">

</head>

<body>

    <div class="login-box">

        <h2>Create Account</h2>

        <input
            type="text"
            id="name"
            placeholder="Enter Name">

        <input
            type="email"
            id="email"
            placeholder="Enter Email">

        <input
            type="password"
            id="password"
            placeholder="Enter Password">

        <button
            onclick="registerUser()">

            Register

        </button>

        <br><br>

        <a href="login.html">

            Already have account?

        </a>

    </div>

    <script src="auth.js"></script>

</body>

</html>
